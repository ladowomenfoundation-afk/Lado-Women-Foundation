<h3>CONTROL ROOM</h3>

<select id="role">
<option>admin</option>
<option>state</option>
<option>district</option>
<option>block</option>
</select>

<input id="level" placeholder="Enter Level (State/District/Block)"><br>

<button onclick="loadControl()">Load Data</button>

<div id="controldata"></div>

<script>

function loadControl(){

let role=document.getElementById("role").value;
let level=document.getElementById("level").value;

fetch(API+"?type=control&role="+role+"&level="+level)
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(d=>{
html+=`
<div class="card">
<b>${d.name}</b><br>
Leader: ${d.leader}<br>
District: ${d.district}<br>
Status: ${d.status}
</div>`;
});

document.getElementById("controldata").innerHTML=html;

});

}

</script>
