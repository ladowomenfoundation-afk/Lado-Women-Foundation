<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Control Room - Lado Women Foundation</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#6a1b9a;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
margin-bottom:15px;
}

select,input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#6a1b9a;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#4a148c;
}

.card{
background:#fff;
padding:10px;
margin:5px 0;
border-left:5px solid #6a1b9a;
}
</style>

</head>

<body>

<div class="header">
CONTROL ROOM - Lado Women Foundation MIS
</div>

<div class="container">

<!-- FILTER PANEL -->
<div class="box">

<h3>Filter Data</h3>

<select id="role">
<option value="admin">Admin</option>
<option value="state">State</option>
<option value="district">District</option>
<option value="block">Block</option>
</select>

<input id="level" placeholder="Enter Level (State/District/Block)">

<button onclick="loadData()">LOAD DATA</button>

</div>

<!-- OUTPUT -->
<div class="box">

<h3>CONTROL DATA</h3>

<div id="out">No Data Loaded</div>

</div>

</div>
