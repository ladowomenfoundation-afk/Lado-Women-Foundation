if(action=="login"){

  let d = sheet("Users").getDataRange().getValues();

  for(let i=1;i<d.length;i++){

    if(
      String(d[i][1]).trim() == String(e.parameter.username).trim() &&
      String(d[i][2]).trim() == String(e.parameter.password).trim() &&
      String(d[i][4]).trim().toUpperCase() == "ACTIVE"
    ){

      return json({
        status:"success",
        userId:d[i][0],
        username:d[i][1],
        role:d[i][3],
        level:d[i][5],
        state:d[i][6],
        district:d[i][7],
        block:d[i][8],
        token:Utilities.getUuid()
      });
    }
  }

  return json({status:"failed"});
}
