<!DOCTYPE html>
<html>
<head>
<title>NGO MIS Login</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0b3d91,#00c6ff);
  color:white;
  text-align:center;
  padding-top:120px;
}

input{
  padding:10px;
  margin:5px;
  width:220px;
  border-radius:5px;
  border:none;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:#28a745;
  color:white;
  font-weight:bold;
}
</style>

</head>

<body>

<h2>NGO MIS LOGIN SYSTEM</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

const API = "YOUR_APPS_SCRIPT_URL";

function login(){

  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      action:"login",
      username:document.getElementById("user").value,
      password:document.getElementById("pass").value
    })
  })
  .then(res=>res.json())
  .then(data=>{

    if(data.status=="success"){

      localStorage.setItem("user",data.user);
      localStorage.setItem("role",data.role);
      localStorage.setItem("token",data.token);

      // 🔥 ROLE ROUTING
      if(data.role=="ADMIN"){
        window.location.href="dashboard.html";
      }
      else if(data.role=="FIELD"){
        window.location.href="field.html";
      }
      else if(data.role=="MEMBER"){
        window.location.href="membership.html";
      }
      else if(data.role=="INTERN"){
        window.location.href="internship.html";
      }

    }else{
      document.getElementById("msg").innerHTML="Invalid Login";
    }

  });

}

</script>

</body>
</html>
