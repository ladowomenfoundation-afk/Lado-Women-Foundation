<!DOCTYPE html>
<html>
<head>
<title>NGO Login</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0b3d91,#00c6ff);
  text-align:center;
  color:white;
  padding-top:120px;
}

input{
  padding:10px;
  margin:5px;
  width:220px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 20px;
  background:#28a745;
  border:none;
  color:white;
  border-radius:5px;
}
</style>

</head>

<body>

<h2>NGO MIS LOGIN</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script>

const API="https://script.google.com/macros/s/AKfycbxx-xBQcPPBnA14qTgjwdAJNbUDwNtwEicao0PoDrDl0gevTz7voZANpxZO77O7ai44dQ/exec";

function login(){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"login",
username:document.getElementById("user").value,
password:document.getElementById("pass").value
})
})
.then(r=>r.json())
.then(d=>{

if(d.status=="success"){

localStorage.setItem("user",d.user);
localStorage.setItem("role",d.role);
localStorage.setItem("token",d.token);

if(d.role=="ADMIN") window.location="dashboard.html";
else if(d.role=="FIELD") window.location="field.html";
else if(d.role=="MEMBER") window.location="membership.html";
else window.location="internship.html";

}else{
document.getElementById("msg").innerHTML="Invalid Login";
}

});

}

</script>

</body>
</html>
