<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lado Women Foundation - Login</title><style>

body{
margin:0;
font-family:Arial,sans-serif;
background:url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f') center center;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.6);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:#fff;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.logo{
font-size:24px;
font-weight:bold;
color:#6a1b9a;
margin-bottom:10px;
}

input{
width:90%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:95%;
padding:12px;
background:#6a1b9a;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4a148c;
}

#msg{
margin-top:10px;
font-weight:bold;
color:red;
}

</style></head><body><div class="overlay"><div class="card"><div class="logo">
Lado Women Foundation
</div><h3>NGO MIS Login</h3><input type="text" id="username" placeholder="Username"><input type="password" id="password" placeholder="Password"><button onclick="login()">
LOGIN
</button><p id="msg"></p></div></div><script>

const API =
"https://script.google.com/macros/s/AKfycbzkSxqeJ4IUPkJj3AMI-c6zxZvaovO_0YIGLyKjIif03xVnwknCir80CiRHqJtZw4wwPg/exec";

function login(){

let username =
document.getElementById("username").value.trim();

let password =
document.getElementById("password").value.trim();

if(username=="" || password==""){
document.getElementById("msg").innerHTML =
"Please enter username and password";
return;
}

let formData = new URLSearchParams();

formData.append("action","login");
formData.append("username",username);
formData.append("password",password);

document.getElementById("msg").innerHTML =
"Checking Login...";

fetch(API,{
method:"POST",
body:formData
})
.then(response => response.json())
.then(data => {

if(data.status=="success"){

localStorage.setItem(
"user",
JSON.stringify(data)
);

window.location.href="dashboard.html";

}else{

document.getElementById("msg").innerHTML =
"Invalid Username or Password";

}

})
.catch(error => {

console.log(error);

document.getElementById("msg").innerHTML =
"Server Error";

});

}

</script></body>
</html>
