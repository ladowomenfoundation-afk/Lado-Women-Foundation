<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SHG Apply</title>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px;}
.container{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:10px;}
input,button{width:100%;padding:10px;margin:8px 0;}
button{background:#6a1b9a;color:#fff;border:none;cursor:pointer;}
button:hover{background:#8e24aa;}
</style>
</head>

<body>

<div class="container">

<h2>🤝 SHG Registration Form</h2>

<input id="shgname" placeholder="SHG Name">
<input id="president" placeholder="President Name">
<input id="mobile" placeholder="Mobile">
<input id="village" placeholder="Village">
<input id="panchayat" placeholder="Gram Panchayat">
<input id="block" placeholder="Block">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="members" placeholder="Total Members">

<button onclick="saveSHG()">Submit Application</button>

<p id="msg"></p>

</div>

<script>

// 🔥 MUST PUT REAL DEPLOYED URL HERE
const API="https://script.google.com/macros/s/PASTE_YOUR_REAL_ID_HERE/exec";

function saveSHG(){

let data = new URLSearchParams();

data.append("action","shg");
data.append("name",document.getElementById("shgname").value);
data.append("leader",document.getElementById("president").value);
data.append("mobile",document.getElementById("mobile").value);
data.append("village",document.getElementById("village").value);
data.append("panchayat",document.getElementById("panchayat").value);
data.append("block",document.getElementById("block").value);
data.append("district",document.getElementById("district").value);
data.append("state",document.getElementById("state").value);
data.append("members",document.getElementById("members").value);

document.getElementById("msg").innerText="Submitting...";

fetch(API,{
method:"POST",
body:data
})
.then(r=>r.json())
.then(res=>{

console.log(res);

if(res.status=="success"){
document.getElementById("msg").innerText="✅ Application Submitted Successfully (ID: "+res.id+")";
}else{
document.getElementById("msg").innerText="❌ Error: "+res.status;
}

})
.catch(err=>{
console.log(err);
document.getElementById("msg").innerText="❌ Network/Server Error";
});

}

</script>

</body>
</html>
