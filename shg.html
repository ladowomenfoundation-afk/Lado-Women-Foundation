<!DOCTYPE html>
<html>
<head>
<title>SHG Registration</title>
</head>

<body>

<h2>SHG Registration Form</h2>

<form id="shgForm">

<input name="shgName" placeholder="SHG Name" required><br><br>
<input name="president" placeholder="President Name" required><br><br>
<input name="mobile" placeholder="Mobile" required><br><br>
<input name="village" placeholder="Village" required><br><br>
<input name="district" placeholder="District" required><br><br>

<button type="submit">Submit</button>

</form>

<p id="msg"></p>

<script>

document.getElementById("shgForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch("YOUR_APPS_SCRIPT_URL", {
    method: "POST",
    body: new FormData(this)
  })
  .then(res => res.text())
  .then(id => {
    document.getElementById("msg").innerHTML =
      "SHG Registered Successfully! ID: " + id;
    document.getElementById("shgForm").reset();
  });

});

</script>

</body>
</html>
