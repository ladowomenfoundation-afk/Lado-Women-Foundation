<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>SHG Management - Lado Women Foundation</title><style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

h2{
color:#6a1b9a;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#6a1b9a;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#8e24aa;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#6a1b9a;
color:white;
padding:10px;
}

table td{
padding:10px;
border:1px solid #ddd;
}

.success{
color:green;
font-weight:bold;
margin-top:10px;
}

</style></head><body><div class="container"><div class="card"><h2>🤝 Create SHG</h2><input id="shgname" placeholder="SHG Name">
<input id="president" placeholder="President Name">
<input id="mobile" placeholder="Mobile Number">
<input id="village" placeholder="Village">
<input id="panchayat" placeholder="Gram Panchayat">
<input id="block" placeholder="Block">
<input id="district" placeholder="District">
<input id="state" placeholder="State">
<input id="members" placeholder="Total Members"><button onclick="saveSHG()">Create SHG</button>

<p id="msg"></p></div><div class="card"><h2>📋 SHG Records</h2><table><tr>
<th>SHG ID</th>
<th>Name</th>
<th>President</th>
<th>Mobile</th>
<th>Members</th>
<th>Status</th>
</tr><tbody id="shgTable"><tr>
<td colspan="6">Records will appear here</td>
</tr></tbody></table></div></div><script>

const API="https://script.google.com/macros/s/AKfycbzkSxqeJ4IUPkJj3AMI-c6zxZvaovO_0YIGLyKjIif03xVnwknCir80CiRHqJtZw4wwPg/exec";

function saveSHG(){

let formData=new URLSearchParams();

formData.append("action","shg");
formData.append("name",document.getElementById("shgname").value);
formData.append("leader",document.getElementById("president").value);
formData.append("mobile",document.getElementById("mobile").value);
formData.append("district",document.getElementById("district").value);
formData.append("block",document.getElementById("block").value);
formData.append("members",document.getElementById("members").value);

fetch(API,{
method:"POST",
body:formData
})
.then(r=>r.json())
.then(data=>{

if(data.status=="success"){

document.getElementById("msg").innerHTML=
"✅ SHG Created Successfully : "+data.id;

}else{

document.getElementById("msg").innerHTML=
"❌ Error";

}

});

}

</script></body>
</html>
