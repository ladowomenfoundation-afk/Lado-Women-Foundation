<!DOCTYPE html>
<html>
<head>
<title>ID Card System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#eef2f7;
  text-align:center;
}

.card{
  width:320px;
  margin:auto;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

img{
  width:100px;
  height:100px;
  border-radius:50%;
}
</style>

</head>

<body>

<h2>Digital ID Card</h2>

<div class="card" id="card"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbzkSxqeJ4IUPkJj3AMI-c6zxZvaovO_0YIGLyKjIif03xVnwknCir80CiRHqJtZw4wwPg/exec";

// CHANGE THIS ID DYNAMICALLY
let memberId="MEM-TEST";

fetch(API+"?type=member&id="+memberId)
.then(r=>r.json())
.then(d=>{

document.getElementById("card").innerHTML=`
<img src="${d.photo || 'https://via.placeholder.com/100'}">
<h3>${d.name}</h3>
<p>ID: ${d.id}</p>
<p>Role: ${d.role}</p>
<p>${d.district} - ${d.block}</p>
<div id="qr"></div>
`;

// QR
new QRCode(document.getElementById("qr"), {
  text: API+"?type=member&id="+d.id,
  width:100,
  height:100
});

});

</script>

</body>
</html>
<button onclick="downloadPDF()">Download ID Card PDF</button>

<script>
function downloadPDF(){

fetch(API+"?type=pdf&id="+memberId)
.then(r=>r.json())
.then(d=>{
  window.open(d.url,"_blank");
});

}
</script>
