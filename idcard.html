<input id="memberId" placeholder="Enter Member ID"><br>
<button onclick="createIDCard()">Generate ID Card</button>

<div id="idresult"></div>

<script>

function createIDCard(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:action=idcard&id=${document.getElementById("memberId").value}
})
.then(r=>r.json())
.then(d=>{

document.getElementById("idresult").innerHTML=
<a href="${d.url}" target="_blank">Download ID Card</a>;

});

}

</script>
