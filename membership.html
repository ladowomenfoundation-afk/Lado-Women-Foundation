function loadMembers(){

fetch(API+"?type=members")
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(m=>{

html+=`
<div class="card">
<img src="${m.photo || 'https://via.placeholder.com/80'}" width="60"><br>
<b>${m.name}</b><br>
Role: ${m.role}<br>
Mobile: ${m.mobile}
</div>
`;

});

document.querySelector("#members").innerHTML=
"<h2>Members</h2>"+html;

});

}

loadMembers();
