<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donate - Lado Women Foundation</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:12px;
width:380px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.2);
}

button{
margin:5px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#6a1b9a;
color:white;
}

button:hover{
background:#8e24aa;
}

input{
width:90%;
padding:10px;
margin:6px;
border:1px solid #ccc;
border-radius:6px;
}

#qrimg{
margin-top:10px;
}

#msg{
margin-top:10px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h2>Support Women Empowerment</h2>

<p>Select Donation Amount</p>

<button onclick="setAmount(500)">₹500</button>
<button onclick="setAmount(1100)">₹1100</button>
<button onclick="setAmount(2100)">₹2100</button>
<button onclick="setAmount(5100)">₹5100</button>
<button onclick="setAmount(11000)">₹11000</button>

<br>

<input id="custom" placeholder="Enter Custom Amount">
<button onclick="setCustom()">Add</button>

<div>
<img id="qrimg" width="200">
</div>

<h3 id="amt">Amount: ₹0</h3>

<input id="name" placeholder="Your Name">
<input id="mobile" placeholder="Mobile Number">
<input id="email" placeholder="Email (optional)">

<button onclick="submitDonation()">Donate Now</button>

<p id="msg"></p>

</div>

<script>

// 🔥 CHANGE THIS
const API="https://script.google.com/macros/s/YOUR_DEPLOYED_ID/exec";

let amount = 0;

// ===== SET AMOUNT =====
function setAmount(val){
amount = val;
updateQR();
}

// ===== CUSTOM AMOUNT =====
function setCustom(){
amount = parseInt(document.getElementById("custom").value) || 0;
updateQR();
}

// ===== UPDATE QR =====
function updateQR(){

document.getElementById("amt").innerText = "Amount: ₹" + amount;

if(amount <= 0) return;

let upi = "upi://pay?pa=ladowomen@upi&am=" + amount + "&cu=INR";

document.getElementById("qrimg").src =
"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + upi;

}

// ===== SUBMIT DONATION =====
function submitDonation(){

let name = document.getElementById("name").value;
let mobile = document.getElementById("mobile").value;
let email = document.getElementById("email").value;

if(!name || amount <= 0){
document.getElementById("msg").innerText = "❌ Please enter name & select amount";
return;
}

let form = new URLSearchParams();

form.append("action","donation");
form.append("name",name);
form.append("mobile",mobile);
form.append("email",email);
form.append("amount",amount);

document.getElementById("msg").innerText = "Processing...";

fetch(API,{
method:"POST",
body:form
})
.then(r=>r.json())
.then(res=>{

if(res.status=="success"){
document.getElementById("msg").innerText =
"✅ Donation successful! Receipt: " + res.receiptNo;
}else{
document.getElementById("msg").innerText =
"❌ Error: " + res.message;
}

})
.catch(err=>{
document.getElementById("msg").innerText =
"❌ Server Error";
});

}

</script>

</body>
</html>
