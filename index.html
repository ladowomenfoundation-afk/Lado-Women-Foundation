<!DOCTYPE html>
<html>
<head>
<title>Lado Women Foundation MIS</title>

<style>

body{margin:0;font-family:Arial;background:#eef2ff}

header{
background:#6a1b9a;
color:white;
padding:18px;
text-align:center;
font-size:20px;
}

nav{
display:flex;
flex-wrap:wrap;
background:#283593;
position:sticky;
top:0;
}

nav button{
flex:1;
padding:10px;
border:none;
color:white;
background:#3949ab;
cursor:pointer;
font-size:12px;
}

section{display:none;padding:15px}
.active{display:block}

.card{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
width:90%;
}

button{
padding:8px;
margin:5px;
background:#6a1b9a;
color:white;
border:none;
}

</style>
</head>

<body>

<header>
🌸 LADO WOMEN FOUNDATION - GOV MIS SYSTEM
</header>

<nav>
<button onclick="show('home')">Dashboard</button>
<button onclick="show('shg')">SHG</button>
<button onclick="show('members')">Members</button>
<button onclick="show('otp')">OTP</button>
<button onclick="show('control')">Control Room</button>
</nav>

<!-- DASHBOARD -->
<section id="home" class="active">
<div class="card" id="dash">Loading...</div>
</section>

<!-- SHG -->
<section id="shg">
<h3>SHG</h3>
<input placeholder="Name">
<input placeholder="Leader">
<input placeholder="Mobile">
<button>Create</button>
<div class="card">SHG list</div>
</section>

<!-- MEMBERS -->
<section id="members">
<h3>Members</h3>
<input placeholder="Name">
<input placeholder="Mobile">
<input placeholder="Role">
<button>Create</button>
<div class="card">Members list</div>
</section>

<!-- OTP -->
<section id="otp">
<h3>OTP LOGIN</h3>
<input id="mobile" placeholder="Mobile">
<button onclick="sendOTP()">Send OTP</button>
<br>
<input id="otp" placeholder="OTP">
<button onclick="verifyOTP()">Verify</button>
</section>

<!-- CONTROL ROOM -->
<section id="control">
<h3>CONTROL ROOM</h3>

<select id="role">
<option>admin</option>
<option>state</option>
<option>district</option>
<option>block</option>
</select>

<input id="level" placeholder="Level"><br>

<button onclick="loadControl()">Load</button>

<div id="data"></div>
</section>

<script>

const API="YOUR_SCRIPT_URL_HERE";

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// DASHBOARD
fetch(API)
.then(r=>r.json())
.then(d=>{
document.getElementById("dash").innerHTML=`
Total SHG: ${d.total}<br>
Approved: ${d.approved}<br>
Pending: ${d.pending}<br>
Rejected: ${d.rejected}
`;
});

// CONTROL ROOM
function loadControl(){

let role=document.getElementById("role").value;
let level=document.getElementById("level").value;

fetch(API+"?type=control&role="+role+"&level="+level)
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(d=>{
html+=`
<div class="card">
${d.name}<br>
${d.leader}<br>
${d.district}<br>
${d.status}
</div>`;
});

document.getElementById("data").innerHTML=html;

});

}

// OTP
function sendOTP(){
fetch(API,{method:"POST",body:action=sendotp&mobile=${mobile.value}});
}

function verifyOTP(){
fetch(API,{method:"POST",body:action=verifyotp&mobile=${mobile.value}&otp=${otp.value}})
.then(r=>r.json())
.then(d=>alert(d.status));
}

</script>

</body>
</html>
