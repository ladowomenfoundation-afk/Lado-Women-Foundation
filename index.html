<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lado Women Foundation - Login</title>
<link rel="stylesheet" href="style.css">

<style>
body{
background:#f4f4f4;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:25px;
width:320px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#6a1b9a;
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:95%;
padding:10px;
background:#6a1b9a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#4a148c;
}

#msg{
color:red;
margin-top:10px;
}
</style>

</head>

<body>

<div class="box">

<h2>Lado Women Foundation</h2>
<p>NGO MIS LOGIN PANEL</p>

<input type="text" id="username" placeholder="Enter Username">
<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">LOGIN</button>

<p id="msg"></p>

</div>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

function login(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u=="" || p==""){
document.getElementById("msg").innerText = "Please fill all fields";
return;
}

fetch(API,{
method:"POST",
body:action=login&username=${u}&password=${p}
})
.then(res=>res.json())
.then(data=>{

if(data.status=="success"){
localStorage.setItem("user",JSON.stringify(data));
window.location.href="dashboard.html";
}else{
document.getElementById("msg").innerText="Invalid Login";
}

})
.catch(err=>{
document.getElementById("msg").innerText="Server Error";
});

}

</script>

</body>
</html>
