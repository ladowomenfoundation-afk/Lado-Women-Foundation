<!DOCTYPE html>
<html>
<head>
<title>Lado Women Foundation</title>

<style>

body{margin:0;font-family:Arial;background:#f4f6ff}

header{
background:#8e24aa;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

nav{
display:flex;
flex-wrap:wrap;
background:#283593;
position:sticky;
top:0;
}

nav button{
flex:1;
padding:12px;
border:none;
color:white;
background:#3949ab;
}

section{display:none;padding:15px}
.active{display:block}

.card{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<header>🌸 LADO WOMEN FOUNDATION</header>

<nav>
<button onclick="show('home')">Dashboard</button>
<button onclick="show('shg')">SHG</button>
<button onclick="show('members')">Members</button>
<button onclick="show('otp')">OTP Login</button>
</nav>

<!-- DASHBOARD -->
<section id="home" class="active">

<div class="card" id="t"></div>
<div class="card" id="a"></div>
<div class="card" id="p"></div>
<div class="card" id="r"></div>

</section>

<!-- SHG -->
<section id="shg">

<h3>SHG</h3>

<input placeholder="Name"><br>
<input placeholder="Leader"><br>
<input placeholder="Mobile"><br>

<button onclick="createSHG()">Create</button>

<div id="shgList"></div>

</section>

<!-- MEMBERS -->
<section id="members">

<h3>Members</h3>

<input placeholder="Name"><br>
<input placeholder="Mobile"><br>
<input placeholder="Role"><br>

<button onclick="createMember()">Create</button>

<div id="memberList"></div>

</section>

<!-- OTP -->
<section id="otp">

<h3>OTP LOGIN</h3>

<input id="mobile" placeholder="Mobile"><br>
<button onclick="sendOTP()">Send OTP</button><br><br>

<input id="otp" placeholder="Enter OTP"><br>
<button onclick="verifyOTP()">Verify</button>

</section>

<script>

const API="YOUR_SCRIPT_URL_HERE";

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// DASHBOARD
fetch(API)
.then(r=>r.json())
.then(d=>{
document.getElementById("t").innerHTML="Total SHG: "+d.total;
document.getElementById("a").innerHTML="Approved: "+d.approved;
document.getElementById("p").innerHTML="Pending: "+d.pending;
document.getElementById("r").innerHTML="Rejected: "+d.rejected;
});

// SHG
function createSHG(){

let i=document.querySelectorAll("#shg input");

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:action=shg&name=${i[0].value}&leader=${i[1].value}&mobile=${i[2].value}&district=NA&block=NA&members=0
});

alert("SHG Created");
}

// MEMBERS
function createMember(){

let i=document.querySelectorAll("#members input");

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:action=member&name=${i[0].value}&mobile=${i[1].value}&role=${i[2].value}&photo=NA&district=NA&block=NA
});

alert("Member Created");
}

// OTP
function sendOTP(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:action=sendotp&mobile=${document.getElementById("mobile").value}
});

alert("OTP Sent");
}

function verifyOTP(){

fetch(API,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:action=verifyotp&mobile=${document.getElementById("mobile").value}&otp=${document.getElementById("otp").value}
})
.then(r=>r.json())
.then(d=>{
alert(d.status);
});

}

</script>

</body>
</html>
