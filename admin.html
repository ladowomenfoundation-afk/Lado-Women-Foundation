<!DOCTYPE html>
<html>
<head>
<title>NGO Admin Panel</title>

<style>
body{font-family:Arial;background:#f4f6f9;margin:0;}

.header{
  background:#0b3d91;
  color:white;
  padding:15px;
  text-align:center;
}

.card{
  background:white;
  margin:10px;
  padding:10px;
  border-radius:6px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
  padding:8px 12px;
  margin:5px;
  border:none;
  color:white;
}

.approve{background:green;}
.reject{background:red;}
</style>

</head>

<body>

<div class="header">
  <h2>SHG Admin Panel (MIS)</h2>
</div>

<div id="data"></div>

<script>

const API = "YOUR_APPS_SCRIPT_URL";

fetch(API)
.then(res=>res.json())
.then(data=>{

  let html="";

  data.forEach(d=>{

    html += `
    <div class="card">
      <b>${d.name}</b> (ID: ${d.shgId})<br>
      ${d.village} | ${d.district}<br>
      Status: ${d.status}<br>

      <button class="approve" onclick="update('${d.shgId}','approve')">Approve</button>
      <button class="reject" onclick="update('${d.shgId}','reject')">Reject</button>
    </div>
    `;

  });

  document.getElementById("data").innerHTML = html;

});

function update(id,action){

  fetch(API,{
    method:"POST",
    body:new URLSearchParams({
      shgId:id,
      action:action
    })
  })
  .then(()=>location.reload());

}

</script>

</body>
</html>
