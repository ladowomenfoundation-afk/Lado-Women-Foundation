<!DOCTYPE html>
<html>
<head>
<title>Admin SHG Panel</title>

<style>
body{font-family:Arial;background:#f4f6f9;}
.card{
  background:white;
  margin:10px;
  padding:10px;
  border-left:5px solid #0b3d91;
  border-radius:5px;
}
button{
  margin:3px;
  padding:5px 10px;
}
</style>

</head>

<body>

<h2>SHG Admin Panel</h2>

<div id="data"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxx-xBQcPPBnA14qTgjwdAJNbUDwNtwEicao0PoDrDl0gevTz7voZANpxZO77O7ai44dQ/exec";

function load(){

fetch(API+"?type=shg")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(d=>{

html+=`
<div class="card">
<b>${d.name}</b><br>
Leader: ${d.leader}<br>
Status: ${d.status}<br>

<button onclick="update('${d.id}','Approved')">Approve</button>
<button onclick="update('${d.id}','Rejected')">Reject</button>
</div>
`;

});

document.getElementById("data").innerHTML=html;

});

}

function update(id,status){

fetch(API,{
method:"POST",
body:new URLSearchParams({
action:"updateStatus",
id:id,
status:status
})
}).then(()=>load());

}

load();

</script>

</body>
</html>
