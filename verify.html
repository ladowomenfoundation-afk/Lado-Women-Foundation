<!DOCTYPE html>
<html>
<head>
<title>Certificate Verification</title>
</head>

<body style="text-align:center;font-family:Arial;margin-top:100px;">

<h2>Lado Women Foundation</h2>
<h3>Certificate Verification System</h3>

<input id="cid" placeholder="Enter Certificate ID" style="padding:10px;width:250px;">
<button onclick="check()">Verify</button>

<p id="result"></p>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

function check(){

let id = document.getElementById("cid").value;

fetch(API + "?type=verifyCertificate&id=" + id)
.then(r=>r.json())
.then(data=>{

if(data.status=="valid"){

document.getElementById("result").innerHTML = `
<h3 style="color:green">✔️ VALID CERTIFICATE</h3>
Name: ${data.name}<br>
Father: ${data.father}<br>
College: ${data.college}<br>
Issue Date: ${data.issueDate}
`;

}else{
document.getElementById("result").innerHTML =
"<h3 style='color:red'>❌ INVALID CERTIFICATE</h3>";
}

});

}

</script>

</body>
</html>
