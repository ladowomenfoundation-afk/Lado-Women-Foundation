<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Room - LWF</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#6a1b9a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.box{
padding:20px;
}

select,input,button{
padding:10px;
margin:5px;
}

.card{
background:white;
padding:10px;
margin:10px 0;
border-left:5px solid #6a1b9a;
}
</style>
</head>

<body>

<div class="header">
Control Room - Lado Women Foundation MIS
</div>

<div class="box">

<select id="role">
<option value="admin">Admin</option>
<option value="state">State</option>
<option value="district">District</option>
<option value="block">Block</option>
</select>

<input id="level" placeholder="Enter Level (State/District/Block)">

<button onclick="loadControl()">Load Data</button>

<div id="result"></div>

</div>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

function loadControl(){

let role = document.getElementById("role").value;
let level = document.getElementById("level").value;

fetch(API + "?type=control&role=" + role + "&level=" + level)
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(d=>{
html += `
<div class="card">
<b>${d.name}</b><br>
Leader: ${d.leader}<br>
District: ${d.district}<br>
Block: ${d.block}<br>
Status: ${d.status}
</div>
`;
});

document.getElementById("result").innerHTML = html;

});

}

</script>

</body>
</html>
