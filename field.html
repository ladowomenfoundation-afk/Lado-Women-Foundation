<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Field Reports - Lado Women Foundation</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#6a1b9a;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

input,textarea{
width:90%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
background:#6a1b9a;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#4a148c;
}

.card{
background:#fff;
padding:10px;
margin:5px 0;
border-left:5px solid #6a1b9a;
}
</style>

</head>

<body>

<div class="header">
FIELD REPORT SYSTEM - Lado Women Foundation
</div>

<div class="container">

<!-- FORM -->
<div class="box">

<h3>Create Field Report</h3>

<input id="user" placeholder="User Name">
<input id="title" placeholder="Report Title">

<textarea id="desc" placeholder="Description"></textarea>

<input id="photo" placeholder="Photo URL (Google Drive / Link)">

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">
<input id="location" placeholder="Location Name">

<button onclick="saveReport()">SUBMIT REPORT</button>

<p id="msg"></p>

</div>

<!-- LIST -->
<div class="box">

<h3>Reports</h3>

<div id="list">Loading...</div>

<button onclick="loadReports()">REFRESH</button>

</div>

</div>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

// SAVE REPORT
function saveReport(){

fetch(API,{
method:"POST",
body:action=fieldreport&user=${user.value}&title=${title.value}&description=${desc.value}&photo=${photo.value}&lat=${lat.value}&lng=${lng.value}&location=${location.value}
})
.then(r=>r.json())
.then(d=>{

document.getElementById("msg").innerText = "Report Saved: " + d.id;

loadReports();

});
}

// LOAD REPORTS
function loadReports(){

fetch(API+"?type=field")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(d=>{
html += `
<div class="card">
<b>${d.title}</b><br>
By: ${d.user}<br>
Location: ${d.location}
</div>
`;
});

document.getElementById("list").innerHTML = html;

});

}

// INIT
loadReports();

</script>

</body>
</html>
