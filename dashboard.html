<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="overlay">

<h2>NGO MIS DASHBOARD</h2>

<div class="card">
<p id="user"></p>

<div class="nav">

<button onclick="load('members')">Members</button>
<button onclick="load('shg')">SHG</button>
<button onclick="load('volunteers')">Volunteers</button>
<button onclick="load('internshipList')">Internship</button>

</div>

</div>

<div class="card">
<pre id="data">Loading...</pre>
</div>

</div>

<script>
const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

let user = JSON.parse(localStorage.getItem("user") || "{}");

document.getElementById("user").innerText =
"Welcome: " + (user.role || "Guest");

function load(type){

fetch(API+"?type="+type)
.then(res=>res.json())
.then(data=>{
document.getElementById("data").innerText =
JSON.stringify(data,null,2);
})
.catch(()=>{
document.getElementById("data").innerText="Error loading data";
});
}
</script>

</body>
</html>
