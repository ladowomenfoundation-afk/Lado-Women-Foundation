<!DOCTYPE html>
<html>
<head>
<title>MIS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
  text-align:center;
}

.card{
  background:white;
  padding:20px;
  margin:10px;
  display:inline-block;
  border-radius:10px;
  width:150px;
}
</style>

</head>

<body>

<h2>NGO MIS Dashboard</h2>

<div class="card" id="total">Total</div>
<div class="card" id="approved">Approved</div>
<div class="card" id="pending">Pending</div>
<div class="card" id="rejected">Rejected</div>

<canvas id="pie" width="300"></canvas>
<canvas id="bar" width="300"></canvas>

<script>

const API="https://script.google.com/macros/s/AKfycbzkSxqeJ4IUPkJj3AMI-c6zxZvaovO_0YIGLyKjIif03xVnwknCir80CiRHqJtZw4wwPg/exec";

fetch(API)
.then(r=>r.json())
.then(d=>{

// CARDS
document.getElementById("total").innerHTML="Total<br>"+d.total;
document.getElementById("approved").innerHTML="Approved<br>"+d.approved;
document.getElementById("pending").innerHTML="Pending<br>"+d.pending;
document.getElementById("rejected").innerHTML="Rejected<br>"+d.rejected;

// PIE CHART
new Chart(document.getElementById("pie"), {
  type: 'pie',
  data: {
    labels: ['Approved','Pending','Rejected'],
    datasets: [{
      data: [d.approved, d.pending, d.rejected]
    }]
  }
});

// BAR CHART
new Chart(document.getElementById("bar"), {
  type: 'bar',
  data: {
    labels: ['Approved','Pending','Rejected'],
    datasets: [{
      data: [d.approved, d.pending, d.rejected]
    }]
  }
});

});

</script>

</body>
</html>
