<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lado Women Foundation MIS Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#6a1b9a;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:#2c2c2c;
height:100vh;
color:white;
padding-top:20px;
}

.sidebar button{
width:100%;
padding:12px;
background:none;
border:none;
color:white;
text-align:left;
cursor:pointer;
border-bottom:1px solid #444;
}

.sidebar button:hover{
background:#6a1b9a;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
color:#6a1b9a;
margin:0;
}

/* DATA BOX */
.box{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.item{
padding:10px;
border-bottom:1px solid #eee;
}

/* USER */
.userbox{
margin-bottom:10px;
font-weight:bold;
}

.logout{
background:red;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
Lado Women Foundation - GOVERNMENT MIS DASHBOARD
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<button onclick="loadData('shg')">SHG</button>
<button onclick="loadData('members')">Members</button>
<button onclick="loadData('volunteers')">Volunteers</button>
<button onclick="loadData('field')">Field Reports</button>

<button onclick="window.location.href='control.html'">Control Room</button>

<button class="logout" onclick="logout()">Logout</button>

</div>

<!-- MAIN AREA -->
<div class="main">

<div class="userbox" id="userInfo"></div>

<!-- STATS -->
<div class="cards">
<div class="card">
<h2 id="shgCount">0</h2>
<p>SHG Groups</p>
</div>

<div class="card">
<h2 id="memberCount">0</h2>
<p>Members</p>
</div>

<div class="card">
<h2 id="volCount">0</h2>
<p>Volunteers</p>
</div>
</div>

<!-- DATA -->
<div class="box" id="dataBox">
Select menu to view data
</div>

</div>

</div>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

// CHECK LOGIN
let user = localStorage.getItem("user");

if(!user){
window.location.href="login.html";
}

user = JSON.parse(user);

document.getElementById("userInfo").innerHTML =
"Welcome: " + user.username + " | Role: " + user.role + " | Level: " + user.level;

// LOAD STATS
function loadStats(){

fetch(API)
.then(r=>r.json())
.then(data=>{

document.getElementById("shgCount").innerText = data.total_shg || 0;
document.getElementById("memberCount").innerText = data.total_members || 0;
document.getElementById("volCount").innerText = data.total_volunteers || 0;

});

}

// LOAD DATA
function loadData(type){

fetch(API + "?type=" + type)
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(d=>{
html += `
<div class="item">
<b>${d.name || d.title || d.id}</b><br>
${d.district || ""} ${d.block || ""} ${d.status || ""}
</div>
`;
});

document.getElementById("dataBox").innerHTML = html;

});

}

// LOGOUT
function logout(){
localStorage.removeItem("user");
window.location.href="login.html";
}

// INIT
loadStats();

</script>

</body>
</html>
