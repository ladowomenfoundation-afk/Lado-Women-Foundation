<!DOCTYPE html>
<html>
<head>
<title>NGO MIS Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f6f9;
}

.header{
  background:#0b3d91;
  color:white;
  padding:15px;
  text-align:center;
}

.container{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:20px;
  text-align:center;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

canvas{
  background:white;
  padding:10px;
  border-radius:8px;
  margin:20px auto;
  display:block;
}
</style>

</head>

<body>

<div class="header">
  <h2>Lado Women Foundation - MIS Dashboard</h2>
</div>

<div class="container">

  <div class="card">Total SHG<br><h2 id="total">0</h2></div>
  <div class="card">Approved<br><h2 id="approved">0</h2></div>
  <div class="card">Pending<br><h2 id="pending">0</h2></div>
  <div class="card">Rejected<br><h2 id="rejected">0</h2></div>

</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>

const API = "YOUR_APPS_SCRIPT_URL";

fetch(API)
.then(res => res.json())
.then(data => {

  // numbers
  document.getElementById("total").innerText = data.total;
  document.getElementById("approved").innerText = data.approved;
  document.getElementById("pending").innerText = data.pending;
  document.getElementById("rejected").innerText = data.rejected;

  // chart
  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: ["Total", "Approved", "Pending", "Rejected"],
      datasets: [{
        label: "SHG Stats",
        data: [
          data.total,
          data.approved,
          data.pending,
          data.rejected
        ]
      }]
    }
  });

});

</script>

</body>
</html>
