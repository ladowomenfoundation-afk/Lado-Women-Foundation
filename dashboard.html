<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Lado Women Foundation</title>

<link rel="stylesheet" href="style.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

.header{
background:#6a1b9a;
color:white;
padding:18px;
text-align:center;
}

.header h1{
margin:0;
font-size:22px;
}

.header p{
margin:5px 0 0 0;
font-size:14px;
opacity:0.9;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
text-align:center;
}

.value{
font-size:28px;
font-weight:bold;
color:#6a1b9a;
margin-top:10px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
}

.menu button{
padding:10px 15px;
border:none;
background:#6a1b9a;
color:white;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#4a148c;
}

#content{
padding:20px;
background:white;
margin:10px;
border-radius:10px;
min-height:200px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>Lado Women Foundation NGO</h1>
<p>Women Empowerment • MIS Dashboard System</p>
</div>

<!-- STATS -->
<div class="grid">

<div class="card">
SHG
<div class="value" id="shg">0</div>
</div>

<div class="card">
Members
<div class="value" id="members">0</div>
</div>

<div class="card">
Volunteers
<div class="value" id="volunteers">0</div>
</div>

</div>

<!-- MENU -->
<div class="menu">

<button onclick="load('shg')">SHG</button>
<button onclick="load('members')">Members</button>
<button onclick="load('volunteers')">Volunteers</button>
<button onclick="load('control')">Control Room</button>
<button onclick="load('field')">Field Reports</button>

</div>

<!-- CONTENT -->
<div id="content">
Select a module to view data
</div>

<script>

const API = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

// STATS LOAD
function loadStats(){

fetch(API)
.then(r=>r.json())
.then(d=>{

document.getElementById("shg").innerText = d.total_shg || 0;
document.getElementById("members").innerText = d.total_members || 0;
document.getElementById("volunteers").innerText = d.total_volunteers || 0;

});

}

// MODULE LOAD
function load(type){

fetch(API + "?type=" + type)
.then(r=>r.json())
.then(d=>{

document.getElementById("content").innerHTML =
"<pre style='text-align:left'>" + JSON.stringify(d,null,2) + "</pre>";

});

}

loadStats();

</script>

</body>
</html>
