<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef2f7;margin:0;}

.header{
background:#0b3d91;
color:white;
padding:15px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
MIS DASHBOARD
</div>

<div class="grid">

<div class="card">Total <h2 id="t">0</h2></div>
<div class="card">Approved <h2 id="a">0</h2></div>
<div class="card">Pending <h2 id="p">0</h2></div>
<div class="card">Rejected <h2 id="r">0</h2></div>

</div>

<canvas id="c"></canvas>

<script>

const API="https://script.google.com/macros/s/AKfycbxx-xBQcPPBnA14qTgjwdAJNbUDwNtwEicao0PoDrDl0gevTz7voZANpxZO77O7ai44dQ/exec";

fetch(API)
.then(r=>r.json())
.then(d=>{

document.getElementById("t").innerText=d.total;
document.getElementById("a").innerText=d.approved;
document.getElementById("p").innerText=d.pending;
document.getElementById("r").innerText=d.rejected;

new Chart(document.getElementById("c"),{
type:"doughnut",
data:{
labels:["Approved","Pending","Rejected"],
datasets:[{data:[d.approved,d.pending,d.rejected]}]
}
});

});

</script>

</body>
</html>
