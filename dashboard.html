<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NGO Dashboard Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

/* TOP NAV */
.topbar{
background:#6a1b9a;
color:white;
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.tab{
padding:10px 15px;
background:rgba(255,255,255,0.2);
border-radius:8px;
cursor:pointer;
}

.tab:hover{
background:white;
color:#6a1b9a;
}

/* CONTENT */
.container{
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* FILTERS */
select{
padding:10px;
margin:5px;
}
</style>
</head>

<body>

<!-- TOP MENU -->
<div class="topbar">

<div class="tab" onclick="showTab('dashboard')">Dashboard</div>
<div class="tab" onclick="showTab('team')">Our Team</div>
<div class="tab" onclick="showTab('shg')">SHG</div>
<div class="tab" onclick="showTab('members')">Members</div>
<div class="tab" onclick="showTab('donation')">Donation</div>

</div>

<!-- CONTENT -->
<div class="container">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2>Welcome Dashboard</h2>
<div class="card" id="stats"></div>
</div>

<!-- TEAM FILTER SYSTEM -->
<div id="team" class="section" style="display:none">

<h2>Our Team (Hierarchy View)</h2>

<select id="level" onchange="loadState()">
<option value="">Select Level</option>
<option>National</option>
<option>State</option>
<option>District</option>
<option>Block</option>
</select>

<select id="state" onchange="loadDistrict()"></select>
<select id="district" onchange="loadBlock()"></select>
<select id="block"></select>

<button onclick="loadTeam()">View Team</button>

<div id="teamData"></div>

</div>

<!-- OTHER TABS -->
<div id="shg" class="section" style="display:none">
<h2>SHG Data</h2>
<div id="shgData"></div>
</div>

<div id="members" class="section" style="display:none">
<h2>Members</h2>
<div id="memberData"></div>
</div>

<div id="donation" class="section" style="display:none">
<h2>Donation Records</h2>
<div id="donationData"></div>
</div>

</div>

<script>

const API="YOUR_APPS_SCRIPT_URL";

// ================= TAB SWITCH =================
function showTab(tab){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(tab).style.display="block";

if(tab=="dashboard") loadStats();
if(tab=="shg") loadSHG();
if(tab=="members") loadMembers();
if(tab=="donation") loadDonation();
}

// ================= STATS =================
function loadStats(){
fetch(API+"?type=stats")
.then(r=>r.json())
.then(d=>{
document.getElementById("stats").innerHTML=`
SHG: ${d.shg}<br>
Members: ${d.members}<br>
Volunteers: ${d.volunteers}<br>
Internships: ${d.internships}
`;
});
}

// ================= TEAM FILTER =================
function loadState(){
let level=document.getElementById("level").value;

if(level=="National"){
alert("National Team View");
}
}

// dummy hierarchy (later DB se connect kar dena)
function loadDistrict(){
document.getElementById("district").innerHTML="<option>District A</option>";
}
function loadBlock(){
document.getElementById("block").innerHTML="<option>Block A</option>";
}

function loadTeam(){
document.getElementById("teamData").innerHTML=
"Filtered Team Data will show here...";
}

// ================= SHG =================
function loadSHG(){
fetch(API+"?type=shglist")
.then(r=>r.json())
.then(data=>{
document.getElementById("shgData").innerHTML=
data.map(d=><div class="card">${d.name} - ${d.leader}</div>).join("");
});
}

// ================= MEMBERS =================
function loadMembers(){
document.getElementById("memberData").innerHTML="Members loading...";
}

// ================= DONATION =================
function loadDonation(){
document.getElementById("donationData").innerHTML="Donation data loading...";
}

</script>

</body>
</html>
